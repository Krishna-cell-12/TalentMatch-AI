# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  TalentMatch-AI is a 4-phase intelligent candidate ranking pipeline:

  Phase 1 (pre-computation): Groq Llama-3.3-70B parses the job description
  into structured signals (must-have skills, YoE, behavioral traits).

  Phase 2 (optional, research): FAISS + sentence-transformers semantic search
  over 100K profiles to build an initial candidate shortlist.

  Phase 3: Multi-signal hybrid scoring engine combining semantic similarity
  (45%), metadata signals — YoE compliance + title relevance + skill overlap
  (40%), and behavioral signals — recruiter response rate (15%).

  Phase 4 (optional, research): Groq LLM re-ranks the Top 20 candidates with
  deep contextual reasoning, producing explainable recruiter notes.

  For the offline ranking submission (rank.py), we use a pure CPU scoring
  approach: metadata signals (YoE + title + skill overlap), behavioral signals
  (recruiter response rate + activity), and platform signals (applications,
  profile views, skill tests). Honeypot detection identifies profiles with
  impossible career timelines or expertise-without-experience patterns.

  Runtime: ~3-4 minutes for 100K candidates on a standard laptop CPU.
  No API calls. No network. No GPU.

